version: '3.8'

services:
  mongodb:
    image: mongo:latest
    expose:
      - 27017
    networks:
      - myapp-networks
    volumes:
      - mydata:/data/db
  
  reverse-proxy:
    image: nginx:alpine
    ports:
      - 3000:80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - myapp-networks
    depends_on:
      - frontend
      - backend

  backend:
    build: ./express-app
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/simple_crud
    expose:
      - "5000"   
    networks:
      - myapp-networks
    depends_on:
      - mongodb
  
  frontend:
    build: ./frontend
    expose:
      - "80"
    networks:
      - myapp-networks

networks:
  myapp-networks:
    driver: bridge
volumes:
  mydata: